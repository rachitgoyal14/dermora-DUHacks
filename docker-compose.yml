services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dermora-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # Explicit overrides if needed, or let env_file handle it.
      - PORT=8000
    restart: always
